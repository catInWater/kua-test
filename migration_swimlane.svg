<line x1="1160" y1="1017" x2="1560" y2="1017" stroke="#2f5bea" stroke-width="2.5" />
<polygon points="1560,1017 1550,1012 1550,1022" fill="#2f5bea" />
<text x="1360.0" y="1003" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="21" font-weight="normal" text-anchor="middle" fill="#2f5bea">按数据名称发送 Interest</text>
<line x1="1560" y1="1133" x2="690" y2="1133" stroke="#4c78a8" stroke-width="2.5" stroke-dasharray="8,6" />
<polygon points="690,1133 700,1128 700,1138" fill="#4c78a8" />
<text x="1125.0" y="1119" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="21" font-weight="normal" text-anchor="middle" fill="#4c78a8">按名称路由命中可用数据源</text>
<line x1="690" y1="1207" x2="1160" y2="1207" stroke="#2a9d8f" stroke-width="2.5" />
<polygon points="1160,1207 1150,1202 1150,1212" fill="#2a9d8f" />
<text x="925.0" y="1193" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="21" font-weight="normal" text-anchor="middle" fill="#2a9d8f">返回对应 Data</text>
<rect x="970" y="1283" width="380" height="72" fill="#e0f0eb" stroke="#4f7f76" stroke-width="2" rx="8" />
<text x="1160.0" y="1326.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">写入本地存储
并记录迁移结果日志</text>
<rect x="500" y="1409" width="380" height="56" fill="#ffe3e3" stroke="#c95d63" stroke-width="2" rx="8" />
<text x="690.0" y="1444.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">延迟 10 秒后退出旧服务</text>
</svg>