<polygon points="1160,785 1150,780 1150,790" fill="#d1495b" />
<text x="925.0" y="771" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="21" font-weight="normal" text-anchor="middle" fill="#d1495b">INSERT | NO_REPLICATE | MIGRATE</text>
<rect x="970" y="865" width="380" height="70" fill="#e0f0eb" stroke="#4f7f76" stroke-width="2" rx="8" />
<text x="1160.0" y="907.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">接收迁移命令
