<rect x="55" y="175" width="310" height="56" fill="#fff4cf" stroke="#c29b1f" stroke-width="2" rx="8" />
<text x="210.0" y="210.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">SVS 心跳更新成员视图</text>
<line x1="210" y1="321" x2="690" y2="321" stroke="#b8860b" stroke-width="2.5" />
<polygon points="690,321 680,316 680,326" fill="#b8860b" />
<text x="450.0" y="307" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="21" font-weight="normal" text-anchor="middle" fill="#b8860b">触发归属重算</text>
<line x1="210" y1="363" x2="1160" y2="363" stroke="#b8860b" stroke-width="2.5" />
<polygon points="1160,363 1150,358 1150,368" fill="#b8860b" />
<text x="685.0" y="349" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="21" font-weight="normal" text-anchor="middle" fill="#b8860b">触发归属重算</text>
<rect x="510" y="407" width="360" height="56" fill="#ffe3e3" stroke="#c95d63" stroke-width="2" rx="8" />
<text x="690.0" y="442.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">依据 Maglev 结果识别 owner 变化</text>
<rect x="980" y="407" width="360" height="56" fill="#e0f0eb" stroke="#4f7f76" stroke-width="2" rx="8" />
<text x="1160.0" y="442.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">依据 Maglev 结果识别 owner 变化</text>
<rect x="970" y="513" width="380" height="72" fill="#e0f0eb" stroke="#4f7f76" stroke-width="2" rx="8" />
<text x="1160.0" y="556.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">创建 bucket 与本地服务
并注册名称前缀</text>
<rect x="510" y="633" width="360" height="70" fill="#ffe3e3" stroke="#c95d63" stroke-width="2" rx="8" />
<text x="690.0" y="675.0" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="20" font-weight="normal" text-anchor="middle" fill="#111">迁移前等待 5 秒
