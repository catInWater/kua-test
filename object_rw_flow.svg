<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1320" viewBox="0 0 1680 1320">
<rect width="100%" height="100%" fill="#faf8f2" />
<text x="840.0" y="52" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#111">原始 kua 对象读写流程</text>
<rect x="40" y="90" width="1600" height="560" fill="#fffdf8" stroke="#c7bda8" stroke-width="2" rx="18" />
