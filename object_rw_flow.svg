<rect x="1220" y="134" width="180" height="50" fill="#f5cac3" stroke="#333" stroke-width="2" rx="12" />
<text x="1310" y="166" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#111">客户端数据源</text>
<line x1="1310" y1="194" x2="1310" y2="616" stroke="#777" stroke-width="2" stroke-dasharray="10,8" />
<rect x="1440" y="134" width="180" height="50" fill="#cdb4db" stroke="#333" stroke-width="2" rx="12" />
<text x="1530" y="166" font-family="DejaVu Sans, Noto Sans SC, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#111">网络缓存</text>
